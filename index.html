<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Garage Builder</title>
  </head>
  <body>
    <main>
      <h1>BUILD YOUR GARAGE.</h1>
      <p>
        Track every mod, oil change, and service record across all your
        vehicles. Your build history, all in one place.
      </p>
      <form id="carForm">
        <label for="make">Make</label>
        <input type="text" id="make" name="make" />

        <label for="model">Model</label>
        <input type="text" id="model" name="model" />

        <label for="year">Year</label>
        <input type="number" id="year" name="year" />

        <label for="category">Category</label>
        <select id="category" name="category">
          <option value="" disabled selected>Select type...</option>
          <option value="daily">Daily Driver</option>
          <option value="weekend">Weekender</option>
          <option value="track">Track Car</option>
        </select>

        <input type="submit" value="ADD TO MY GARAGE" />
      </form>

      <section id="dashboard">
        <div class="vehicle-card">
          <span id="vehicle-num">0</span>
          <span id="vehicles-tracker">Vehicles Tracked</span>
        </div>

        <div class="vehicle-card">
          <span id="vehicle-num">0</span>
          <span id="vehicles-tracker">Vehicles Tracked</span>
        </div>

        <div class="vehicle-card">
          <span id="vehicle-num">0</span>
          <span id="vehicles-tracker">Vehicles Tracked</span>
        </div>

        <div class="vehicle-card">
          <span id="vehicle-num">0</span>
          <span id="vehicles-tracker">Vehicles Tracked</span>
        </div>
      </section>

      <section id="my-garage">
        <h2>My Garage</h2>
        <div class="garage-card">
          <img class="garage-image" src=".jpg" alt="An image of a car" />
          <span class="car-year">1993</span>
          <span class="car-name">Honda Civic</span>
          <span class="mod-number">3 Mods</span>
          <span class="oil-changes">Oil: 3K ago</span>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
